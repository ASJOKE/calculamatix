function g(id){ return document.getElementById(id); }
function normalize(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
}

// ── AUTOCOMPLÉTION ──
var acTimeout = null;
var selectedPlayer = null;

g('searchInput').addEventListener('input', function(){
  clearTimeout(acTimeout);
  var q = this.value.trim();
  if(q.length < 2){ hideAC(); return; }
  acTimeout = setTimeout(function(){ doSuggest(q); }, 250);
});

g('searchInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ hideAC(); searchPlayer(); }
  if(e.key === 'Escape'){ hideAC(); }
});

document.addEventListener('click', function(e){
  if(!e.target.closest('#autocomplete') && e.target !== g('searchInput')) hideAC();
});

function hideAC(){
  var ac = g('autocomplete');
  if(ac){ ac.style.display='none'; ac.innerHTML=''; }
}

async function doSuggest(q){
  var norm = normalize(q);
  var localMatches = [];

  // 1. Recherche locale d'abord (instantanée)
  Object.keys(ENRICHED).forEach(function(k){
    if(normalize(k).includes(norm) || norm.includes(normalize(k).substring(0,3))){
      var d = ENRICHED[k];
      localMatches.push({name: k.charAt(0).toUpperCase()+k.slice(1), club:d.club, ligue:d.ligue, poste:d.poste, emoji:d.emoji, local:true});
    }
  });

  if(localMatches.length > 0){
    showAC(localMatches);
  }

  // 2. Appel API suggest en parallèle
  try {
    var url = BASE + '/api/v1/search/suggest?q=' + encodeURIComponent(q);
    var res = await fetch(url, {method:'GET', headers:HEADERS});
    if(res.ok){
      var data = await res.json();
      // api_v1_search_suggest retourne un tableau de strings ou objets
      var suggestions = data.results || data.suggestions || data || [];
      if(Array.isArray(suggestions) && suggestions.length > 0){
        // Si on a des résultats API, on cherche les joueurs correspondants
        var url2 = BASE + '/api/v1/search/players?q=' + encodeURIComponent(q) + '&sport=football';
        var res2 = await fetch(url2, {method:'GET', headers:HEADERS});
        if(res2.ok){
          var data2 = await res2.json();
          var players = data2.results || data2.players || data2 || [];
          if(Array.isArray(players) && players.length > 0){
            var apiMatches = players.slice(0,6).map(function(p){
              return {
                name: p.name || p.shortName || q,
                club: (p.team && p.team.name) || '',
                ligue: (p.team && p.team.tournament && p.team.tournament.name) || '',
                poste: p.position || '',
                emoji: '⚽',
                local: false,
                apiData: p
              };
            });
            // Fusionner local + API sans doublon
            apiMatches.forEach(function(am){
              var exists = localMatches.find(function(lm){ return normalize(lm.name) === normalize(am.name); });
              if(!exists) localMatches.push(am);
            });
            showAC(localMatches);
          }
        }
      }
    }
  } catch(e){ /* API indispo, on garde les résultats locaux */ }
}

function showAC(players){
  var ac = g('autocomplete');
  if(!ac || players.length === 0){ hideAC(); return; }
  ac.innerHTML = players.slice(0,8).map(function(p){
    return '<div class="ac-item" onclick="selectPlayer(this)" data-name="'+p.name+'">'
      +'<span style="font-size:20px">'+p.emoji+'</span>'
      +'<div>'
      +'<div class="ac-name">'+p.name+'</div>'
      +'<div class="ac-meta">'+(p.club||'')+(p.ligue?' · '+p.ligue:'')+(p.poste?' · '+p.poste:'')+'</div>'
      +'</div>'
      +'</div>';
  }).join('');
  ac.style.display = 'block';
}

function selectPlayer(el){
  var name = el.getAttribute('data-name');
  g('searchInput').value = name;
  hideAC();
  searchPlayer();
}

function quickSearch(name){ g('searchInput').value = name; hideAC(); searchPlayer(); }

// ── RECHERCHE PRINCIPALE ──
async function searchPlayer(){
  var query = g('searchInput').value.trim();
  if(!query) return;

  var btn = g('searchBtn');
  btn.disabled = true; btn.textContent = '⏳';
  g('loader').classList.add('show');
  g('errorBox').classList.remove('show');
  g('resultWrap').classList.remove('show');
  g('resultWrap').innerHTML = '';

  try {
    var norm = normalize(query);

    // 1. Chercher dans enriched
    var eKey = Object.keys(ENRICHED).find(function(k){
      var nk = normalize(k);
      return nk === norm || nk.includes(norm) || norm.includes(nk) ||
             (norm.length >= 4 && nk.includes(norm.substring(0,4)));
    });

    var playerData;

    if(eKey){
      playerData = buildFromEnriched(query, ENRICHED[eKey]);
    } else {
      // 2. Appel API search_players
      playerData = await fetchFromAPI(query);
    }

    if(!playerData) throw new Error('Joueur non trouvé. Essayez un nom de la liste ou un des raccourcis ci-dessous.');
    renderResult(playerData);

  } catch(err){
    g('errorBox').textContent = '⚠️ ' + err.message;
    g('errorBox').classList.add('show');
  } finally {
    g('loader').classList.remove('show');
    btn.disabled = false; btn.textContent = 'Analyser →';
  }
}

function buildFromEnriched(query, d){
  var name = query.charAt(0).toUpperCase() + query.slice(1);
  // Capitaliser proprement
  var eKey = Object.keys(ENRICHED).find(function(k){ return normalize(k) === normalize(query) || normalize(k).includes(normalize(query).substring(0,4)); });
  if(eKey) name = eKey.split(' ').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
  return {nom:name, poste:d.poste, club:d.club, ligue:d.ligue, age:d.age, emoji:d.emoji,
    buts:d.buts, passes:d.passes, minutes:d.minutes, matchs:d.matchs,
    xg:d.xg, note:d.note, transfert:d.transfert, salaire:d.salaire, source:'enrichi'};
}

async function fetchFromAPI(query){
  // api_v1_search_players
  var url = BASE + '/api/v1/search/players?q=' + encodeURIComponent(query) + '&sport=football';
  var res = await fetch(url, {method:'GET', headers:HEADERS});

  if(!res.ok) throw new Error('Joueur "'+query+'" non trouvé. Essayez : Mbappé, Salah, Haaland, Rashford, Barcola, Yamal...');

  var data = await res.json();
  var players = data.results || data.players || data || [];
  if(!Array.isArray(players) || players.length === 0)
    throw new Error('Joueur "'+query+'" introuvable. Vérifiez l'orthographe.');

  var p = players[0];

  // Récupérer les stats via api_v1_player_seasonstatistics si on a l'id
  var stats = null;
  if(p.id){
    try {
      var sUrl = BASE + '/api/v1/player/'+p.id+'/season/statistics?season=2024';
      var sRes = await fetch(sUrl, {method:'GET', headers:HEADERS});
      if(sRes.ok){ var sData = await sRes.json(); stats = sData.statistics || sData; }
    } catch(e){}
  }

  var age = null;
  if(p.dateOfBirthTimestamp) age = Math.floor((Date.now()/1000 - p.dateOfBirthTimestamp)/31536000);

  return {
    nom: p.name || p.shortName || query,
    poste: p.position || 'Joueur de champ',
    club: (p.team && p.team.name) || 'Club inconnu',
    ligue: (p.team && p.team.tournament && p.team.tournament.name) || '',
    age: age, emoji: '⚽',
    buts: (stats && stats.goals) || null,
    passes: (stats && stats.assists) || null,
    minutes: (stats && stats.minutesPlayed) || null,
    matchs: (stats && stats.appearances) || null,
    xg: null, note: (stats && stats.rating) || null,
    transfert: null, salaire: null, source: 'api'
  };
}

// ── CALCUL SCORE ──
function calcScore(d){
  var s = {};
  if(d.buts !== null && d.matchs && d.matchs > 0){
    var bpm = d.buts/d.matchs, ppm = (d.passes||0)/d.matchs;
    s.perf = Math.min(100, Math.max(0, Math.round(bpm/0.8*60 + ppm/0.5*40)));
  } else s.perf = null;

  if(d.xg !== null && d.buts !== null && d.xg > 0){
    s.xg = Math.min(100, Math.max(0, Math.round(d.buts/d.xg*60)));
  } else s.xg = null;

  if(d.minutes !== null){
    s.reg = Math.min(100, Math.round(d.minutes/3420*100));
  } else s.reg = null;

  if(d.age !== null){
    s.age = d.age<=21?100:d.age<=24?90:d.age<=27?75:d.age<=29?55:d.age<=31?35:15;
  } else s.age = null;

  if(d.note !== null){
    s.impact = Math.min(100, Math.max(0, Math.round((d.note-5)/5*100)));
  } else s.impact = null;

  var poids = {perf:30,xg:25,reg:20,age:15,impact:10};
  var total = 0, tp = 0;
  Object.keys(poids).forEach(function(k){
    if(s[k] !== null){ total += s[k]*poids[k]; tp += poids[k]; }
  });
  return {dims:s, global: tp>0 ? Math.round(total/tp) : 50};
}

function getVerdict(score){
  if(score>=82) return {txt:'🔥 Sous-évalué',    color:'var(--green)', bg:'rgba(0,245,160,.15)', border:'rgba(0,245,160,.4)'};
  if(score>=68) return {txt:'✅ Prix juste',      color:'var(--blue)',  bg:'rgba(77,159,255,.12)',border:'rgba(77,159,255,.3)'};
  if(score>=50) return {txt:'⚠️ Légère survaleur',color:'var(--amber)', bg:'rgba(255,179,71,.1)', border:'rgba(255,179,71,.3)'};
  return               {txt:'❌ Surpayé',         color:'var(--red)',   bg:'rgba(255,77,106,.1)', border:'rgba(255,77,106,.3)'};
}

function getDimColor(v){ return v>=75?'var(--green)':v>=55?'var(--blue)':v>=35?'var(--amber)':'var(--red)'; }

function renderResult(d){
  var sc  = calcScore(d);
  var vrd = getVerdict(sc.global);
  var dims = [
    {key:'perf',   name:'Performance offensive', note:'Buts + passes pondérés par match'},
    {key:'xg',     name:'xG Efficiency',          note:'Finition réelle vs buts attendus'},
    {key:'reg',    name:'Régularité',              note:'Temps de jeu sur la saison'},
    {key:'age',    name:'Âge économique',          note:'Valeur d'investissement vs durée'},
    {key:'impact', name:'Impact global',            note:'Note moyenne toutes compétitions'},
  ];

  var shareText = d.emoji+' '+d.nom+' — Analyse Calculamatix\n'
    +'━━━━━━━━━━━━━━━━━━━━\n'
    +'📊 Score : '+sc.global+'/100\n'
    +'🏷️ Verdict : '+vrd.txt+'\n'
    +(d.buts!==null?'⚽ Buts : '+d.buts+'\n':'')
    +(d.xg!==null?'📐 xG efficiency : ×'+Math.round(d.buts/d.xg*10)/10+'\n':'')
    +(d.transfert?'💰 Valorisation : '+d.transfert+'M€\n':'')
    +'━━━━━━━━━━━━━━━━━━━━\n'
    +'calculamatix.com/transfert-foot';

  var html = '<div class="player-header">'
    +'<div class="player-avatar">'+d.emoji+'</div>'
    +'<div class="player-info">'
    +'<div class="player-name">'+d.nom+'</div>'
    +'<div class="player-meta">'
    +(d.club?'<span>🏟️ '+d.club+'</span>':'')
    +(d.ligue?'<span>🌍 '+d.ligue+'</span>':'')
    +(d.poste?'<span>📌 '+d.poste+'</span>':'')
    +(d.age?'<span>🎂 '+d.age+' ans</span>':'')
    +'</div></div>'
    +'<div class="score-ring-wrap"><div class="score-num" style="color:'+getDimColor(sc.global)+'">'+sc.global+'</div><div class="score-label">/ 100</div></div>'
    +'<div class="verdict-badge" style="color:'+vrd.color+';background:'+vrd.bg+';border:1px solid '+vrd.border+'">'+vrd.txt+'</div>'
    +'</div>';

  html += '<div class="g2">';
  // Dimensions
  html += '<div class="card"><div class="ctitle">Score par dimension</div>';
  dims.forEach(function(dim){
    var val = sc.dims[dim.key];
    if(val===null){
      html += '<div class="dim-row"><div class="dim-top"><span class="dim-name">'+dim.name+'</span><span class="dim-val" style="color:var(--muted)">N/A</span></div><div class="dim-bar"><div class="dim-fill" style="width:20%;background:var(--muted);opacity:.3"></div></div></div>';
    } else {
      var c = getDimColor(val);
      html += '<div class="dim-row"><div class="dim-top"><span class="dim-name">'+dim.name+'</span><span class="dim-val" style="color:'+c+'">'+val+'/100</span></div>'
        +'<div class="dim-bar"><div class="dim-fill" style="width:'+val+'%;background:'+c+'"></div></div>'
        +'<div style="font-size:10px;color:var(--muted);margin-top:3px;font-family:DM Mono,monospace">'+dim.note+'</div></div>';
    }
  });
  html += '</div>';

  // Stats
  html += '<div class="card"><div class="ctitle">Statistiques saison</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  [{val:d.buts,lbl:'Buts',c:'var(--green)'},{val:d.passes,lbl:'Passes déc.',c:'var(--blue)'},
   {val:d.matchs,lbl:'Matchs',c:'var(--text)'},{val:d.minutes?Math.round(d.minutes/(d.matchs||1))+''':null,lbl:'Min./match',c:'var(--muted)'},
   {val:d.xg,lbl:'xG saison',c:'var(--purple)'},{val:d.note,lbl:'Note moy.',c:'var(--amber)'}
  ].forEach(function(s){
    html += '<div class="stat-box"><div class="stat-val" style="color:'+s.c+'">'+(s.val!==null&&s.val!==undefined?s.val:'—')+'</div><div class="stat-lbl">'+s.lbl+'</div></div>';
  });
  html += '</div>';
  if(d.transfert){
    html += '<div class="di"><span>Valorisation</span><span style="color:var(--yellow)">'+d.transfert+'M€</span></div>';
    if(d.salaire) html += '<div class="di"><span>Salaire annuel</span><span>'+d.salaire+'M€</span></div>';
    if(d.buts) html += '<div class="di"><span>Coût par but</span><span>'+Math.round(d.transfert/d.buts*10)/10+'M€</span></div>';
  }
  if(d.xg!==null&&d.buts!==null&&d.xg>0){
    var ratio = Math.round(d.buts/d.xg*100)/100;
    var comment = ratio>1.2?'Finisseur exceptionnel — marque plus que prévu par les stats.':ratio>0.9?'Dans la moyenne — finition conforme aux attentes.':'Sous-performe devant le but — les occasions ne se transforment pas.';
    html += '<div class="xg-explain">📐 <strong>xG Efficiency ×'+ratio+'</strong><br>'+comment+' Buts réels ('+d.buts+') vs xG ('+d.xg+') = '+(Math.round((d.buts-d.xg)*10)/10)+' but(s) d'écart.</div>';
  }
  html += '</div></div>';

  html += '<div class="share-card"><div class="ctitle" style="color:var(--green)">📤 Partager ce verdict</div>'
    +'<div class="share-preview" id="sharePreview">'+shareText.replace(/\n/g,'\n')+'</div>'
    +'<div class="share-btns">'
    +'<button class="share-btn btn-x" onclick="shareX()">𝕏 Twitter / X</button>'
    +'<button class="share-btn btn-wa" onclick="shareWA()">📱 WhatsApp</button>'
    +'<button class="share-btn btn-copy" onclick="copyText()">📋 Copier</button>'
    +'</div></div>';

  html += '<div class="disc">⚠️ <strong style="color:var(--amber)">Disclaimer :</strong> Outil de divertissement et d'analyse pour les fans. Scores calculés à partir de statistiques publiques. Pas un avis de scouting professionnel. Valorisations basées sur estimations publiques (Transfermarkt, presse). Sources : SportAPI (RapidAPI), données enrichies Calculamatix 2025-2026.</div>';

  g('resultWrap').innerHTML = html;
  g('resultWrap').classList.add('show');
  window.scrollTo({top: g('resultWrap').offsetTop - 80, behavior:'smooth'});
  window._shareText = shareText;
}

function shareX(){ window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent((window._shareText||'').replace(/\n/g,'\n')),'_blank'); }
function shareWA(){ window.open('https://wa.me/?text='+encodeURIComponent((window._shareText||'').replace(/\n/g,'\n')),'_blank'); }
function copyText(){
  navigator.clipboard.writeText((window._shareText||'').replace(/\n/g,'\n')).then(function(){
    var btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ Copié !';
    setTimeout(function(){ btn.textContent = '📋 Copier'; }, 2000);
  });
}
</script>
