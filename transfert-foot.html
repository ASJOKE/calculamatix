<html lang="fr">

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#06070d;--card:#0e1020;--border:#1a1d35;
      --yellow:#FFD93D;--green:#00F5A0;--blue:#4D9FFF;
      --red:#FF4D6A;--purple:#B06EFF;--amber:#FFB347;
      --teal:#00E5CC;--text:#E8ECF8;--muted:#4A5080;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

    /* Fond animé */
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(77,159,255,.06),transparent),
                 radial-gradient(ellipse 60% 40% at 80% 110%,rgba(0,245,160,.04),transparent)}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3;
      background-image:linear-gradient(rgba(77,159,255,.03) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(77,159,255,.03) 1px,transparent 1px);
      background-size:40px 40px}

    nav{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:17px;text-decoration:none;color:var(--text)}
    .logo span{color:var(--yellow)}
    .back{font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:.5px;text-transform:uppercase}

    .hero{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:44px 24px 32px;text-align:center}
    .htag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:rgba(0,245,160,.07);border:1px solid rgba(0,245,160,.2);padding:4px 14px;border-radius:100px;margin-bottom:16px;font-family:'DM Mono',monospace;letter-spacing:.5px}
    h1{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(22px,4.5vw,48px);letter-spacing:-2px;line-height:1.05;margin-bottom:12px}
    h1 em{color:var(--green);font-style:normal}
    .hero-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:560px;margin:0 auto}

    /* SEARCH */
    .search-wrap{position:relative;z-index:10;max-width:700px;margin:32px auto 0;padding:0 24px}
    .search-box{display:flex;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:8px 8px 8px 20px;align-items:center;transition:border-color .2s}
    .search-box:focus-within{border-color:rgba(0,245,160,.4)}
    .search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;padding:6px 0}
    .search-input::placeholder{color:var(--muted)}
    .search-btn{background:linear-gradient(135deg,var(--green),var(--teal));border:none;color:#050f0c;padding:12px 24px;border-radius:10px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap;letter-spacing:.3px}
    .search-btn:hover{opacity:.85}
    .search-btn:disabled{opacity:.4;cursor:not-allowed}

    /* Suggestions rapides */
    .quick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px;padding:0 24px}
    .qtag{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace}
    .qtag:hover{border-color:rgba(0,245,160,.3);color:var(--green)}

    /* ÉTAT */
    .state-wrap{position:relative;z-index:10;max-width:960px;margin:30px auto 0;padding:0 24px}

    /* Loading */
    .loader{text-align:center;padding:60px 20px;display:none}
    .loader.show{display:block}
    .loader-ball{width:60px;height:60px;margin:0 auto 20px;font-size:48px;animation:spin 1.5s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

    /* Error */
    .error-box{background:rgba(255,77,106,.07);border:1px solid rgba(255,77,106,.25);border-radius:14px;padding:20px 24px;text-align:center;display:none;font-size:13px;color:#ff8fa0;line-height:1.7}
    .error-box.show{display:block}

    /* RÉSULTATS */
    .result-wrap{display:none;flex-direction:column;gap:16px}
    .result-wrap.show{display:flex}

    /* Header joueur */
    .player-header{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .player-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;border:2px solid rgba(0,245,160,.3)}
    .player-info{flex:1}
    .player-name{font-family:'Unbounded',sans-serif;font-size:clamp(18px,3vw,28px);font-weight:900;letter-spacing:-1px;margin-bottom:4px}
    .player-meta{font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;font-family:'DM Mono',monospace}
    .player-meta span{display:flex;align-items:center;gap:5px}
    .verdict-badge{padding:10px 20px;border-radius:100px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-align:center;white-space:nowrap}

    /* Score global */
    .score-ring-wrap{text-align:center;min-width:120px}
    .score-num{font-family:'Unbounded',sans-serif;font-size:48px;font-weight:900;line-height:1}
    .score-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:'DM Mono',monospace}

    /* Grid 2 colonnes */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
    .ctitle{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px}

    /* Barres de score */
    .dim-row{margin-bottom:14px}
    .dim-row:last-child{margin-bottom:0}
    .dim-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
    .dim-name{color:var(--text)}
    .dim-val{font-family:'DM Mono',monospace;font-weight:700}
    .dim-bar{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
    .dim-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}

    /* Stats grid */
    .stat-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
    .stat-val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;line-height:1;margin-bottom:4px}
    .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace}

    /* Partage */
    .share-card{background:linear-gradient(135deg,rgba(0,245,160,.08),rgba(77,159,255,.05));border:1px solid rgba(0,245,160,.2);border-radius:16px;padding:20px 24px}
    .share-preview{background:rgba(0,0,0,.4);border-radius:12px;padding:16px 20px;margin-bottom:16px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);line-height:1.8;white-space:pre-wrap}
    .share-btns{display:flex;gap:10px;flex-wrap:wrap}
    .share-btn{flex:1;min-width:120px;padding:10px 16px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;text-align:center}
    .share-btn:hover{opacity:.8}
    .btn-x{background:#000;color:#fff;border:1px solid #333}
    .btn-wa{background:#25D366;color:#fff}
    .btn-copy{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}

    /* Disclaimer */
    .disc{background:rgba(255,179,71,.04);border:1px solid rgba(255,179,71,.15);border-radius:10px;padding:12px 16px;font-size:11px;color:var(--muted);line-height:1.7;font-family:'DM Mono',monospace}

    /* xG explainer */
    .xg-explain{background:rgba(77,159,255,.05);border:1px solid rgba(77,159,255,.15);border-radius:10px;padding:14px 16px;font-size:12px;color:var(--muted);line-height:1.7;margin-top:10px}
    .xg-explain strong{color:var(--blue)}

    .di{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
    .di span:first-child{font-size:12px;color:var(--muted)}
    .di span:last-child{font-family:'DM Mono',monospace;font-size:12px}

    @media(max-width:640px){
      .g2{grid-template-columns:1fr}
      .player-header{flex-direction:column;text-align:center}
      .player-meta{justify-content:center}
      .share-btns{flex-direction:column}
    }
  </style>
</head>

<div class="hero">
  <div class="htag">⚽ Football · Transferts · Data</div>
  <h1>Vaut-il vraiment<br>son <em>transfert ?</em></h1>
  <p class="hero-sub">Score en 5 dimensions basé sur les stats réelles. Performance, xG efficiency, régularité, âge économique, impact collectif. Le calcul que les clubs font — maintenant accessible à tous.</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span style="font-size:18px">⚽</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Tapez un nom de joueur... Mbappé, Salah, Bellingham" autocomplete="off"/>

    <button class="qtag" onclick="quickSearch('Vinicius')">Vinicius Jr</button>
    <button class="qtag" onclick="quickSearch('Haaland')">Haaland</button>

  <!-- Loading -->

    <div class="loader-ball">⚽</div>

  <!-- Error -->

<script>
var API_KEY = '22600316cdmsh9ac90312790a77ap1c4878jsn17c286bd6071';

// ── Données enrichies codées en dur pour les tops joueurs ──
// Permet d'avoir des données précises même si l'API retourne peu
var ENRICHED = {
  'mbappe':    {transfert:180, salaire:25, age:26, poste:'Attaquant', club:'Real Madrid', ligue:'Liga', buts:28, passes:9,  minutes:2800, matchs:35, xg:22.4, xga:7.1, note:8.1, emoji:'⚡'},
  'salah':     {transfert:65,  salaire:18, age:33, poste:'Ailier',    club:'Liverpool',   ligue:'Premier League', buts:27, passes:14, minutes:3100, matchs:38, xg:21.2, xga:9.4, note:8.3, emoji:'🔥'},
  'bellingham':{transfert:115, salaire:12, age:21, poste:'Milieu',    club:'Real Madrid', ligue:'Liga', buts:19, passes:11, minutes:2750, matchs:32, xg:14.1, xga:8.2, note:8.0, emoji:'💎'},
  'vinicius':  {transfert:200, salaire:20, age:24, poste:'Ailier',    club:'Real Madrid', ligue:'Liga', buts:23, passes:16, minutes:2900, matchs:34, xg:17.8, xga:11.2, note:8.2, emoji:'🌟'},
  'haaland':   {transfert:180, salaire:22, age:25, poste:'Attaquant', club:'Man City',    ligue:'Premier League', buts:33, passes:5,  minutes:2600, matchs:31, xg:29.4, xga:3.8, note:8.4, emoji:'🚀'},
  'pedri':     {transfert:90,  salaire:9,  age:22, poste:'Milieu',    club:'Barcelone',   ligue:'Liga', buts:8,  passes:13, minutes:2400, matchs:30, xg:6.2,  xga:8.7, note:7.9, emoji:'🎯'},
  'rodri':     {transfert:120, salaire:14, age:28, poste:'Milieu défensif', club:'Man City', ligue:'Premier League', buts:6, passes:9, minutes:2900, matchs:35, xg:4.1, xga:6.8, note:8.5, emoji:'🧠'},
  'kane':      {transfert:95,  salaire:20, age:32, poste:'Attaquant', club:'Bayern Munich', ligue:'Bundesliga', buts:35, passes:12, minutes:3200, matchs:38, xg:28.6, xga:10.2, note:8.3, emoji:'👑'},
  'osimhen':   {transfert:130, salaire:11, age:26, poste:'Attaquant', club:'Galatasaray', ligue:'Süper Lig', buts:26, passes:7,  minutes:2700, matchs:33, xg:21.4, xga:5.8, note:7.8, emoji:'💥'},
  'dembele':   {transfert:60,  salaire:12, age:28, poste:'Ailier',    club:'PSG',         ligue:'Ligue 1', buts:14, passes:16, minutes:2500, matchs:32, xg:11.2, xga:12.8, note:7.7, emoji:'🎪'},
  'griezmann': {transfert:25,  salaire:18, age:33, poste:'Attaquant', club:'Atlético',    ligue:'Liga', buts:17, passes:12, minutes:2800, matchs:34, xg:13.4, xga:9.2, note:7.8, emoji:'🦊'},
  'saka':      {transfert:150, salaire:13, age:23, poste:'Ailier',    club:'Arsenal',     ligue:'Premier League', buts:18, passes:14, minutes:3000, matchs:36, xg:14.8, xga:10.4, note:8.1, emoji:'🔑'},
};

function g(id){ return document.getElementById(id); }

function quickSearch(name){
  g('searchInput').value = name;
  searchPlayer();
}

g('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') searchPlayer(); });

function normalize(name){
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}

async function searchPlayer(){
  var query = g('searchInput').value.trim();
  if(!query) return;

  var btn = g('searchBtn');
  btn.disabled = true;
  btn.textContent = '⏳';

  g('loader').classList.add('show');
  g('errorBox').classList.remove('show');
  g('resultWrap').classList.remove('show');
  g('resultWrap').innerHTML = '';

  try {
    // Chercher dans les données enrichies d'abord
    var normQuery = normalize(query);
    var enrichedKey = Object.keys(ENRICHED).find(function(k){
      return normalize(k).includes(normQuery) || normQuery.includes(normalize(k));
    });

    var playerData;

    if(enrichedKey){
      // Utiliser les données enrichies — les plus précises
      playerData = buildFromEnriched(query, ENRICHED[enrichedKey]);
    } else {
      // Appeler l'API SportAPI pour les autres joueurs
      playerData = await fetchFromAPI(query);
    }

    if(!playerData){
      throw new Error('Joueur non trouvé. Essayez avec le nom exact (ex: "Mbappé", "Salah", "Haaland").');
    }

    renderResult(playerData);

  } catch(err){
    g('errorBox').textContent = '⚠️ ' + err.message;
    g('errorBox').classList.add('show');
  } finally {
    g('loader').classList.remove('show');
    btn.disabled = false;
    btn.textContent = 'Analyser →';
  }
}

function buildFromEnriched(query, d){
  return {
    nom: query.charAt(0).toUpperCase() + query.slice(1),
    poste: d.poste,
    club: d.club,
    ligue: d.ligue,
    age: d.age,
    emoji: d.emoji,
    buts: d.buts,
    passes: d.passes,
    minutes: d.minutes,
    matchs: d.matchs,
    xg: d.xg,
    xga: d.xga,
    note: d.note,
    transfert: d.transfert,
    salaire: d.salaire,
    source: 'enrichi'
  };
}

async function fetchFromAPI(query){
  // Appel API SportAPI via RapidAPI
  var url = 'https://sportapi7.p.rapidapi.com/api/v1/search/' + encodeURIComponent(query);
  var res = await fetch(url, {
    method: 'GET',
    headers: {
      'x-rapidapi-host': 'sportapi7.p.rapidapi.com',
      'x-rapidapi-key': API_KEY
    }
  });

  if(!res.ok) throw new Error('Erreur API (' + res.status + '). Vérifiez votre connexion.');

  var data = await res.json();

  // Parser la réponse SportAPI
  var results = data.results || data.data || [];
  var player = results.find(function(r){ return r.type === 'player' || r.entity === 'player'; });

  if(!player) throw new Error('Joueur "' + query + '" non trouvé. Essayez avec le nom exact.');

  // Construire un objet joueur depuis les données API
  return {
    nom: player.name || player.shortName || query,
    poste: player.position || 'Joueur de champ',
    club: (player.team && player.team.name) || 'Club inconnu',
    ligue: (player.team && player.team.tournament && player.team.tournament.name) || 'Championnat',
    age: player.dateOfBirthTimestamp ? Math.floor((Date.now()/1000 - player.dateOfBirthTimestamp) / 31536000) : null,
    emoji: '⚽',
    buts: (player.statistics && player.statistics.goals) || null,
    passes: (player.statistics && player.statistics.assists) || null,
    minutes: (player.statistics && player.statistics.minutesPlayed) || null,
    matchs: (player.statistics && player.statistics.appearances) || null,
    xg: null,
    xga: null,
    note: (player.statistics && player.statistics.rating) || null,
    transfert: null,
    salaire: null,
    source: 'api'
  };
}

// ── CALCUL DU SCORE ──
function calcScore(d){
  var scores = {};

  // 1. Performance pure (0-100)
  // Pondération : buts comptent double pour attaquants, passes décisives valorisées pour milieux
  if(d.buts !== null && d.matchs){
    var butsParMatch = d.buts / d.matchs;
    var passesParMatch = (d.passes||0) / d.matchs;
    // Standard : 0.8 but/match = élite
    var perfScore = Math.min(100, Math.round((butsParMatch / 0.8 * 60) + (passesParMatch / 0.5 * 40)));
    scores.perf = Math.max(0, perfScore);
  } else {
    scores.perf = null;
  }

  // 2. xG Efficiency (0-100)
  // Compare buts réels vs buts attendus
  if(d.xg !== null && d.buts !== null && d.xg > 0){
    var ratio = d.buts / d.xg;
    // ratio 1 = dans la moyenne (score 50)
    // ratio 1.5+ = finisseur exceptionnel (score ~90)
    // ratio 0.5 = sous-performance (score ~15)
    var xgScore = Math.min(100, Math.max(0, Math.round(ratio * 60)));
    scores.xg = xgScore;
  } else {
    scores.xg = null;
  }

  // 3. Régularité (0-100)
  // Minutes jouées vs maximum possible (38 matchs × 90 min = 3420)
  if(d.minutes !== null){
    var regularite = Math.min(100, Math.round(d.minutes / 3420 * 100));
    scores.reg = regularite;
  } else {
    scores.reg = null;
  }

  // 4. Score d'âge économique (0-100)
  // Un joueur de 22 ans vaut son investissement plus longtemps qu'un joueur de 31 ans
  if(d.age !== null){
    var ageScore;
    if(d.age <= 21) ageScore = 100;       // Futur
    else if(d.age <= 24) ageScore = 90;   // Prime entrante
    else if(d.age <= 27) ageScore = 75;   // Prime
    else if(d.age <= 29) ageScore = 55;   // Fin de prime
    else if(d.age <= 31) ageScore = 35;   // Déclin entamé
    else ageScore = 15;                    // Fin de carrière
    scores.age = ageScore;
  } else {
    scores.age = null;
  }

  // 5. Note générale / impact (0-100)
  if(d.note !== null){
    // Les notes sont sur 10 en général
    var noteNorm = Math.min(100, Math.round((d.note - 5) / 5 * 100));
    scores.impact = Math.max(0, noteNorm);
  } else {
    scores.impact = null;
  }

  // Score global pondéré
  var poids = {perf:30, xg:25, reg:20, age:15, impact:10};
  var total = 0, totalPoids = 0;
  Object.keys(poids).forEach(function(k){
    if(scores[k] !== null){
      total += scores[k] * poids[k];
      totalPoids += poids[k];
    }
  });
  var global = totalPoids > 0 ? Math.round(total/totalPoids) : 50;

  return {dims: scores, global: global};
}

function getVerdict(score, transfert){
  if(score >= 82) return {txt:'🔥 Sous-évalué', color:'var(--green)',  bg:'rgba(0,245,160,.15)', border:'rgba(0,245,160,.4)'};
  if(score >= 68) return {txt:'✅ Prix juste',   color:'var(--blue)',   bg:'rgba(77,159,255,.12)', border:'rgba(77,159,255,.3)'};
  if(score >= 50) return {txt:'⚠️ Légère survaleur', color:'var(--amber)', bg:'rgba(255,179,71,.1)', border:'rgba(255,179,71,.3)'};
  return           {txt:'❌ Surpayé',           color:'var(--red)',    bg:'rgba(255,77,106,.1)',  border:'rgba(255,77,106,.3)'};
}

function getDimColor(score){
  if(score >= 75) return 'var(--green)';
  if(score >= 55) return 'var(--blue)';
  if(score >= 35) return 'var(--amber)';
  return 'var(--red)';
}

function renderResult(d){
  var sc  = calcScore(d);
  var vrd = getVerdict(sc.global, d.transfert);

  var dims = [
    {key:'perf',   name:'Performance offensive', note:'Buts + passes pondérés par match'},
    {key:'xg',     name:'xG Efficiency',          note:'Finition réelle vs attendue'},
    {key:'reg',    name:'Régularité',              note:'Temps de jeu sur la saison'},
    {key:'age',    name:'Âge économique',          note:'Valeur d\'investissement vs durée'},
    {key:'impact', name:'Impact global',            note:'Note moyenne toutes compétitions'},
  ];

  // Texte partage
  var shareText = d.emoji + ' ' + d.nom + ' — Analyse Calculamatix\n'
    + '━━━━━━━━━━━━━━━━━━━━\n'
    + '📊 Score global : ' + sc.global + '/100\n'
    + '🏷️ Verdict : ' + vrd.txt + '\n'
    + (d.buts!==null ? '⚽ Buts cette saison : ' + d.buts + '\n' : '')
    + (d.xg!==null ? '📐 xG : ' + d.xg + ' (efficiency : ×' + (d.xg>0?Math.round(d.buts/d.xg*10)/10:'?') + ')\n' : '')
    + (d.transfert ? '💰 Valorisation : ' + d.transfert + 'M€\n' : '')
    + '━━━━━━━━━━━━━━━━━━━━\n'
    + 'calculamatix.com/transfert-foot';

  var html = '';

  // Header joueur
  html += '<div class="player-header">'
    + '<div class="player-avatar">' + d.emoji + '</div>'
    + '<div class="player-info">'
    + '<div class="player-name">' + d.nom + '</div>'
    + '<div class="player-meta">'
    + (d.club ? '<span>🏟️ ' + d.club + '</span>' : '')
    + (d.ligue ? '<span>🌍 ' + d.ligue + '</span>' : '')
    + (d.poste ? '<span>📌 ' + d.poste + '</span>' : '')
    + (d.age ? '<span>🎂 ' + d.age + ' ans</span>' : '')
    + '</div></div>'
    + '<div class="score-ring-wrap">'
    + '<div class="score-num" style="color:' + getDimColor(sc.global) + '">' + sc.global + '</div>'
    + '<div class="score-label">/ 100</div>'
    + '</div>'
    + '<div class="verdict-badge" style="color:' + vrd.color + ';background:' + vrd.bg + ';border:1px solid ' + vrd.border + '">' + vrd.txt + '</div>'
    + '</div>';

  // Deux colonnes
  html += '<div class="g2">';

  // Colonne gauche — dimensions
  html += '<div class="card"><div class="ctitle">Score par dimension</div>';
  dims.forEach(function(dim){
    var val = sc.dims[dim.key];
    if(val === null){
      html += '<div class="dim-row"><div class="dim-top"><span class="dim-name">' + dim.name + '</span><span class="dim-val" style="color:var(--muted)">N/A</span></div>'
        + '<div class="dim-bar"><div class="dim-fill" style="width:20%;background:var(--muted);opacity:.3"></div></div></div>';
    } else {
      var c = getDimColor(val);
      html += '<div class="dim-row"><div class="dim-top"><span class="dim-name">' + dim.name + '</span><span class="dim-val" style="color:' + c + '">' + val + '/100</span></div>'
        + '<div class="dim-bar"><div class="dim-fill" style="width:' + val + '%;background:' + c + '"></div></div>'
        + '<div style="font-size:10px;color:var(--muted);margin-top:3px;font-family:DM Mono,monospace">' + dim.note + '</div></div>';
    }
  });
  html += '</div>';

  // Colonne droite — stats
  html += '<div class="card"><div class="ctitle">Statistiques saison</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';

  var stats = [
    {val: d.buts, lbl:'Buts', color:'var(--green)'},
    {val: d.passes, lbl:'Passes déc.', color:'var(--blue)'},
    {val: d.matchs, lbl:'Matchs', color:'var(--text)'},
    {val: d.minutes ? Math.round(d.minutes/d.matchs||1) + '\'' : null, lbl:'Min./match', color:'var(--muted)'},
    {val: d.xg, lbl:'xG saison', color:'var(--purple)'},
    {val: d.note, lbl:'Note moy.', color:'var(--amber)'},
  ];

  stats.forEach(function(s){
    html += '<div class="stat-box"><div class="stat-val" style="color:' + s.color + '">' + (s.val !== null ? s.val : '—') + '</div><div class="stat-lbl">' + s.lbl + '</div></div>';
  });
  html += '</div>';

  // Valorisation si disponible
  if(d.transfert){
    html += '<div class="di"><span>Valorisation actuelle</span><span style="color:var(--yellow)">' + d.transfert + 'M€</span></div>';
    if(d.salaire) html += '<div class="di"><span>Salaire annuel estimé</span><span>' + d.salaire + 'M€</span></div>';
    if(d.buts && d.transfert) html += '<div class="di"><span>Coût par but</span><span>' + Math.round(d.transfert/d.buts*10)/10 + 'M€/but</span></div>';
  }

  // xG explainer
  if(d.xg !== null && d.buts !== null){
    var ratio = Math.round(d.buts/d.xg*100)/100;
    var xgCommentaire = ratio > 1.2 ? 'Finisseur exceptionnel — marque plus que ce que les stats prédisent.'
      : ratio > 0.9 ? 'Dans la moyenne — finition conforme aux attentes.'
      : 'Sous-performe face au but — les occasions ne se transforment pas.';
    html += '<div class="xg-explain">📐 <strong>xG Efficiency ×' + ratio + '</strong><br>' + xgCommentaire + ' La différence buts réels (' + d.buts + ') vs xG (' + d.xg + ') = ' + Math.round((d.buts-d.xg)*10)/10 + ' but(s).</div>';
  }

  html += '</div>'; // fin g2
  html += '</div>';

  // Partage
  html += '<div class="share-card"><div class="ctitle" style="color:var(--green)">📤 Partager ce verdict</div>'
    + '<div class="share-preview" id="sharePreview">' + shareText + '</div>'
    + '<div class="share-btns">'
    + '<button class="share-btn btn-x" onclick="shareX()">𝕏 Twitter / X</button>'
    + '<button class="share-btn btn-wa" onclick="shareWA()">📱 WhatsApp</button>'
    + '<button class="share-btn btn-copy" onclick="copyText()">📋 Copier</button>'
    + '</div></div>';

  // Disclaimer
  html += '<div class="disc">⚠️ <strong style="color:var(--amber)">Disclaimer :</strong> Ce calculateur est un outil de divertissement et d\'analyse pour les fans. Les scores sont calculés à partir de statistiques publiques et d\'estimations. Ils ne constituent pas un avis d\'investissement ou de scouting professionnel. Les valorisations de transfert sont des estimations basées sur des données publiques (Transfermarkt, rapports presse) et peuvent différer des valorisations réelles des clubs. Sources : SportAPI (RapidAPI), données enrichies Calculamatix 2025-2026.</div>';

  g('resultWrap').innerHTML = html;
  g('resultWrap').classList.add('show');
  window.scrollTo({top: g('resultWrap').offsetTop - 80, behavior:'smooth'});

  // Stocker pour le partage
  window._shareText = shareText;
  window._playerName = d.nom;
  window._score = sc.global;
  window._verdict = vrd.txt;
}

function shareX(){
  var t = encodeURIComponent(window._shareText || '');
  window.open('https://twitter.com/intent/tweet?text=' + t, '_blank');
}
function shareWA(){
  var t = encodeURIComponent(window._shareText || '');
  window.open('https://wa.me/?text=' + t, '_blank');
}
function copyText(){
  navigator.clipboard.writeText(window._shareText || '').then(function(){
    var btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ Copié !';
    setTimeout(function(){ btn.textContent = '📋 Copier'; }, 2000);
  });
}
</script>
</body>
</html>
